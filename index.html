<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Jelajah Wisata Indonesia</title>
    <meta name="description" content="Jelajah Wisata Indonesia — galeri 3D bertingkat: pilih provinsi, telusuri destinasinya, lalu nikmati galeri fotonya, di atas ruang gelap sinematik." />
    <meta name="author" content="Jelajah Wisata Indonesia" />
    <meta property="og:title" content="Jelajah Wisata Indonesia" />
    <meta property="og:description" content="Galeri 3D wisata Indonesia bertingkat — provinsi, destinasi, dan galeri foto dengan gerak sinematik." />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div class="vignette" aria-hidden="true"></div>

    <header class="chrome chrome-tl">Jelajah Wisata Indonesia</header>

    <nav class="chrome chrome-tr" id="crumbs" aria-label="Breadcrumb"></nav>

    <button type="button" class="chrome chrome-rc" id="back" data-hot aria-label="Kembali" hidden>
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 2 4 7l5 5"></path>
      </svg>
      <span>Kembali</span>
    </button>

    <div class="chrome chrome-bl">
      <span class="logo" aria-hidden="true">ID</span>
      <span class="hint">Scroll to explore</span>
    </div>

    <div class="chrome chrome-br" aria-label="Card counter">
      <span class="counter-wrap"><span id="counter-num">01</span></span>
      <span class="counter-rest">&nbsp;—&nbsp;11</span>
    </div>

    <div id="detail" aria-hidden="true">
      <button type="button" id="detail-close" data-hot aria-label="Close">&times;</button>
      <div class="detail-content">
        <div class="detail-el detail-eyebrow">
          <span class="line"></span>
          <span id="detail-eyebrow-text">Title Design</span>
        </div>
        <h1 class="detail-el" id="detail-title">Event Horizon</h1>
        <p class="detail-el" id="detail-desc"></p>
      </div>
    </div>

    <div id="loader"><span id="loader-text">Loading 0 / 11</span></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
